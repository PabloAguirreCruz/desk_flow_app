{% extends 'base.html' %}

{% block content %}
<h1>Delete Ticket</h1>
<p>Are you sure you want to delete "<strong>{{ object.title }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete it</button>
    <a href="{% url 'ticket-detail' object.id %}">Cancel</a>
</form>
{% endblock %}
