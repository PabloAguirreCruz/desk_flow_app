{% extends 'base.html' %}

{% block content %}
<h1>Delete Tag</h1>
<p>Are you sure you want to delete "<strong>{{ object.name }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <div class="detail-actions">
        <button type="submit" class="btn btn--danger">Yes, delete</button>
        <a href="{% url 'tag-index' %}" class="btn btn--secondary">Cancel</a>
    </div>
</form>
{% endblock %}
