{% extends 'base.html' %}

{% block content %}
<h1>Delete Tag</h1>
<p>Are you sure you want to delete "<strong>{{ object.name }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete it</button>
    <a href="{% url 'tag-index' %}">Cancel</a>
</form>
{% endblock %}
