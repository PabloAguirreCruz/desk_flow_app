{% extends 'base.html' %}

{% block content %}
<h1>{% if object %}Edit Tag{% else %}New Tag{% endif %}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="detail-actions">
        <button type="submit" class="btn btn--primary">Save</button>
        <a href="{% url 'tag-index' %}" class="btn btn--secondary">Cancel</a>
    </div>
</form>
{% endblock %}
