{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>Tags</h1>
    <a href="{% url 'tag-create' %}" class="btn btn--primary">+ New Tag</a>
</div>

<div class="ticket-list">
    {% for tag in tag_list %}
        <article class="ticket-card">
            <h3><a href="{% url 'tag-detail' tag.id %}">{{ tag.name }}</a></h3>
            <p class="muted">Color: {{ tag.color }}</p>
        </article>
    {% empty %}
        <div class="empty-state">
            <p>No tags yet.</p>
            <a href="{% url 'tag-create' %}" class="btn btn--primary">Create your first tag</a>
        </div>
    {% endfor %}
</div>
{% endblock %}
