{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeskFlow</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="nav">
        <a href="{% url 'home' %}" class="nav__brand">DeskFlow</a>
        {% if user.is_authenticated %}
            <a href="{% url 'ticket-index' %}">My Tickets</a>
            <a href="{% url 'tag-index' %}">Tags</a>
            <a href="{% url 'about' %}">About</a>
            <span class="nav__user">Hi, {{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display: inline; margin: 0;">
                {% csrf_token %}
                <button type="submit" class="nav__logout">Log out</button>
            </form>
        {% else %}
            <a href="{% url 'about' %}">About</a>
            <a href="{% url 'login' %}">Log in</a>
            <a href="{% url 'signup' %}" class="btn btn--primary">Sign up</a>
        {% endif %}
    </nav>

    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
