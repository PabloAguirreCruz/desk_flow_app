<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeskFlow</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
        nav { display: flex; gap: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #ddd; margin-bottom: 2rem; }
        nav a { color: #2563eb; text-decoration: none; font-weight: 500; }
        h1 { margin-top: 0; }
        .ticket-card { border: 1px solid #e5e5e5; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .priority-H { border-left: 4px solid #dc2626; }
        .priority-M { border-left: 4px solid #f59e0b; }
        .priority-L { border-left: 4px solid #10b981; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; background: #f3f4f6; font-size: 0.85rem; }
    </style>
</head>
<body>
    <nav>
    <a href="{% url 'home' %}">Home</a>
    {% if user.is_authenticated %}
        <a href="{% url 'ticket-index' %}">My Tickets</a>
        <a href="{% url 'tag-index' %}">Tags</a>
        <a href="{% url 'about' %}">About</a>
        <span style="margin-left: auto;">Hi, {{ user.username }} ·
            <form method="post" action="{% url 'logout' %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" style="background: none; border: none; color: #2563eb; cursor: pointer; font-weight: 500; padding: 0;">Log out</button>
            </form>
        </span>
    {% else %}
        <a href="{% url 'about' %}">About</a>
        <span style="margin-left: auto;">
            <a href="{% url 'login' %}">Log in</a>
            <a href="{% url 'signup' %}">Sign up</a>
        </span>
    {% endif %}
</nav>
    {% block content %}{% endblock %}
</body>
</html>
