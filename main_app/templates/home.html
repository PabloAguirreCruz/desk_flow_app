{% extends 'base.html' %}

{% block content %}
<section class="hero">
    <h1>DeskFlow</h1>
    <p>An IT help desk built with Django. Submit a ticket, track its progress, get back to work.</p>

    {% if user.is_authenticated %}
        <div class="hero__actions">
            <a href="{% url 'ticket-index' %}" class="btn btn--primary">View your tickets</a>
        </div>
    {% else %}
        <div class="hero__actions">
            <a href="{% url 'signup' %}" class="btn btn--primary">Sign up</a>
            <a href="{% url 'login' %}" class="btn btn--secondary">Log in</a>
        </div>
    {% endif %}
</section>
{% endblock %}
