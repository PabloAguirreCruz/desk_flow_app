{% extends 'base.html' %}

{% block content %}
<h1>Sign Up</h1>

{% if error_message %}
    <p style="color: var(--color-danger);">{{ error_message }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="detail-actions">
        <button type="submit" class="btn btn--primary">Sign up</button>
    </div>
</form>

<p class="muted">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
{% endblock %}
