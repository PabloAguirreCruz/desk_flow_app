{% extends 'base.html' %}

{% block content %}
<h1>Log In</h1>

{% if form.errors %}
    <p style="color: var(--color-danger);">Your username and password didn't match. Please try again.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="detail-actions">
        <button type="submit" class="btn btn--primary">Log in</button>
    </div>
</form>

<p class="muted">Don't have an account? <a href="{% url 'signup' %}">Sign up</a></p>
{% endblock %}
